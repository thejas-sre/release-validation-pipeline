name: Release Validation Pipeline

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install redis requests fastapi uvicorn prometheus-client pydantic python-dotenv httpx

      - name: Start Redis
        run: |
          docker run -d --name test-redis -p 6379:6379 redis:7.2-alpine
          sleep 3

      - name: Run Redis health checks
        run: |
          python3 -c "
          from validation.check_redis import run_redis_checks
          import json, sys
          results = run_redis_checks()
          failed = [r for r in results if r['status'] == 'failed']
          if failed:
              print(f'FAIL: {len(failed)} Redis checks failed')
              sys.exit(1)
          print(f'PASS: All {len(results)} Redis checks passed')
          "

      - name: Run config parity checks
        run: |
          python3 -c "
          from validation.check_config import run_config_checks
          import json, sys
          results = run_config_checks()
          failed = [r for r in results if r['status'] == 'failed']
          if failed:
              print(json.dumps([r for r in results if r['status'] == 'failed'], indent=2))
              sys.exit(1)
          print(f'PASS: All {len(results)} config checks passed')
          "

      - name: Run full validation suite
        run: |
          python3 validation/health_checks.py

      - name: Upload validation reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: validation-reports
          path: reports/
